site_name: Diffusion Zero to Hero
site_description: >-
  Chinese hands-on course for learning diffusion models: DDPM, DDIM, Diffusers,
  Stable Diffusion, CFG, LoRA, ControlNet, SDXL, DiT, Flow Matching, video generation.
site_url: https://haoyuli-nova.github.io/Diffusion-Zero-to-Hero/
repo_url: https://github.com/HaoyuLi-Nova/Diffusion-Zero-to-Hero
repo_name: HaoyuLi-Nova/Diffusion-Zero-to-Hero
edit_uri: edit/master/docs/

use_directory_urls: true

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - How to Learn:
      - Learning Path (EN): how-to-learn-diffusion-models.md
      - 学习路线 (中文): learning-path.md
  - Course:
      - Unit 0 课程准备: unit0/index.md
      - Unit 1 扩散模型入门:
          - 单元导读: unit1/index.md
          - Diffusers 入门: unit1/01-introduction-to-diffusers.md
          - 从零实现扩散模型: unit1/02-diffusion-models-from-scratch.md
      - Unit 2 微调与条件生成:
          - 单元导读: unit2/index.md
          - 微调与引导: unit2/01-finetuning-and-guidance.md
          - 类别条件扩散模型: unit2/02-class-conditioned-diffusion-model.md
      - Unit 3 Stable Diffusion:
          - 单元导读: unit3/index.md
          - Stable Diffusion 入门: unit3/stable-diffusion-introduction.md
      - Unit 4 进阶方向:
          - 单元导读: unit4/index.md
          - DDIM 反演: unit4/01-ddim-inversion.md
          - 音频扩散: unit4/02-diffusion-for-audio.md
      - DreamBooth:
          - 项目导读: hackathon/index.md
          - DreamBooth Notebook: hackathon/dreambooth.md
  - Modern Roadmap: modern-diffusion-roadmap.md
  - Guides:
      - Glossary: glossary.md
      - Troubleshooting: troubleshooting.md
      - Assets: assets.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/HaoyuLi-Nova/Diffusion-Zero-to-Hero
